<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAIST PMBA 14기 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F6F2; --surface: #FFFFFF;
  --text: #1A1A18; --muted: #6B6B67; --border: #E2E0D8;
  --blue: #185FA5;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
}
body { overflow-x: clip; }

/* ── PAGE ── */
.page { max-width: 1400px; margin: 0 auto; padding: 2rem 2.5rem 4rem; }

/* ── STICKY TOP (PC only) ── */
.sticky-top {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  padding: 1.5rem 0 0;
  margin-top: -1.5rem;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  gap: 0.75rem;
}
.header-right { display: flex; align-items: center; gap: 12px; flex-wrap: nowrap; }
.last-updated { font-size: 11px; color: var(--muted); font-weight: 300; white-space: nowrap; }
.school-tag { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.title { font-size: 22px; font-weight: 700; line-height: 1.2; }
.title span { color: var(--blue); }

/* ── SUBSCRIBE BTN ── */
.subscribe-btn {
  display: inline-flex; align-items: center; align-self: center; gap: 6px;
  background: #1A1A18; color: #fff;
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 400;
  padding: 0 12px 0 8px; border-radius: 100px; border: none;
  cursor: pointer; white-space: nowrap; height: 32px;
  transition: opacity 0.15s;
}
.subscribe-btn:hover { opacity: 0.78; }

/* ── LEGEND ── */
.legend-wrap { display: flex; align-items: center; flex-wrap: wrap; gap: 7px; margin-bottom: 0.75rem; }
.legend { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
.legend-item {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; padding: 0 12px 0 8px;
  font-size: 12px; color: var(--muted);
  cursor: pointer; user-select: none;
  height: 32px; white-space: nowrap;
  transition: opacity 0.15s;
}
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-item.inactive { opacity: 0.3; }
.filter-reset {
  display: none; align-items: center;
  font-size: 12px; color: var(--muted);
  background: none; border: 1px solid var(--border);
  border-radius: 100px; padding: 0 12px;
  height: 32px; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; white-space: nowrap;
}
.filter-reset.show { display: flex; }
.filter-reset:hover { background: var(--border); }

/* ── CAL NAV ── */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0; padding-bottom: 0.75rem; }
.nav-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 16px; cursor: pointer; color: var(--text); }
.nav-btn:hover { background: var(--border); }
.month-label { font-size: 17px; font-weight: 500; }
.view-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; color: var(--muted); }
.view-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

/* ── DAY HEADERS STICKY (PC) ── */
.day-headers-sticky {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: #F7F6F2;
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 16px 16px 0 0;
}
.day-headers-sticky .day-header {
  text-align: center; font-size: 13px;
  color: var(--muted); padding: 10px 0; font-weight: 500;
}

/* ── CAL SCROLL WRAP ── */
.cal-scroll-wrap { width: 100%; }

/* ── CAL WRAP (PC: 상단 radius 없음, sticky headers와 이어짐) ── */
.cal-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 16px 16px;
  overflow: hidden;
  width: 100%;
}

/* ── DAY HEADERS (모바일 전용, PC에서는 숨김) ── */
.day-headers {
  display: none;
  grid-template-columns: repeat(7, 1fr);
  background: #F7F6F2;
  border-bottom: 1px solid var(--border);
}
.day-header { text-align: center; font-size: 13px; color: var(--muted); padding: 10px 0; font-weight: 500; }

/* ── DAYS GRID ── */
.days-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-auto-rows: minmax(calc((min(100vw, 1400px) - 5rem) / 7 * 0.9), auto);
}
.day-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 6px; overflow: hidden; display: flex; flex-direction: column; }
.day-cell-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.day-events { flex: 1; overflow: hidden; }
.day-cell:nth-child(7n) { border-right: none; }
.day-num { font-size: 13px; font-weight: 500; color: var(--text); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; flex-shrink: 0; }
.day-num.today { background: var(--blue); color: #fff; font-weight: 700; }
.day-num.other { color: #C5C3BB; }
.day-cell.today-cell { background: rgba(24, 95, 165, 0.05); }
.day-cell.today-pulse { animation: todayPulse 0.8s ease-out; }
@keyframes todayPulse {
  0% { box-shadow: inset 0 0 0 2px var(--blue); }
  100% { box-shadow: inset 0 0 0 0 transparent; }
}
.day-num.sun { color: #D14343; }
.day-num.sat { color: #2E6FC7; }
.day-num.today.sun, .day-num.today.sat { color: #fff; }
.day-header.sun { color: #D14343; }
.day-header.sat { color: #2E6FC7; }
.more-badge { font-size: 10px; color: var(--muted); background: #EFEFEF; border-radius: 4px; padding: 1px 5px; white-space: nowrap; flex-shrink: 0; line-height: 1.6; cursor: pointer; }
.more-badge:hover { background: var(--border); }

/* ── EVENT CHIP ── */
.event-chip {
  font-size: clamp(11px, 1.1vw, 15px);
  padding: 3px 6px;
  border-radius: 4px;
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
  line-height: 1.4;
  display: block;
}
.event-chip:hover { opacity: 0.75; }
.more-chip { font-size: 10px; color: var(--muted); padding: 1px 4px; cursor: pointer; }

/* ── LIST VIEW ── */
.list-view { padding: 1rem; }
.focus-banner {
  background: rgba(24, 95, 165, 0.08);
  color: var(--blue);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.focus-banner button {
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 11px;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
}
.focus-banner button:hover { opacity: 0.85; }
.list-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.list-item:last-child { border-bottom: none; }
.list-item:hover { opacity: 0.75; }
.list-date { flex-shrink: 0; width: 36px; text-align: center; }
.list-date-day { font-size: 18px; font-weight: 700; line-height: 1; }
.list-date-dow { font-size: 10px; color: var(--muted); margin-top: 2px; }
.list-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.list-info { flex: 1; min-width: 0; }
.list-title { font-size: 14px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-meta { font-size: 12px; color: var(--muted); }

/* ── DETAIL PANEL ── */
.detail-panel { margin-top: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; display: none; }
.detail-panel.show { display: block; }
.detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.detail-type { font-size: 11px; font-weight: 500; }
.detail-close { background: none; border: none; font-size: 16px; cursor: pointer; color: var(--muted); }
.detail-title { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
.detail-meta { font-size: 13px; color: var(--muted); line-height: 1.8; white-space: pre-line; }

/* ── STATE / TOAST ── */
.state-msg { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }
.toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--text); color: #fff; font-size: 13px; padding: 10px 20px; border-radius: 100px; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif; z-index: 999; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.scroll-fade-right {
  display: none;
  position: absolute;
  top: 0;
  right: -1rem;
  width: 48px;
  height: 100%;
  background: linear-gradient(to right, rgba(247, 246, 242, 0), rgba(247, 246, 242, 0.85) 60%, rgba(247, 246, 242, 0.95));
  pointer-events: none;
  z-index: 5;
  opacity: 1;
  transition: opacity 0.2s ease;
  display: none;
  align-items: center;
  justify-content: center;
}
.scroll-fade-right.hidden { opacity: 0; }
.scroll-fade-right svg { width: 12px; height: 12px; color: var(--muted); opacity: 0.7; }


#month-picker-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  z-index: 199;
}
#month-picker-overlay.show { display: block; }

@media (max-width: 600px) {
  #month-picker {
    position: fixed !important;
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    top: auto !important;
    margin: 0 !important;
    border-radius: 16px 16px 0 0 !important;
    padding: 20px 16px 28px !important;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15) !important;
    animation: slideUp 0.2s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
}

/* ── MOBILE 세로 (≤600px portrait) ── */
@media (max-width: 600px) and (orientation: portrait) {
  .scroll-fade-right { display: flex; }
  .page { padding: 1.25rem 1rem 3rem; }
  .sticky-top { position: static; padding: 0; margin: 0; }
  .day-headers-sticky { display: none; }
  .day-headers { display: grid; }
  .cal-wrap { border-top: 1px solid var(--border); border-radius: 16px; }
  .day-headers { border-top: none; }
  .header { flex-direction: column; align-items: flex-start; }
  .header-right { justify-content: flex-start; flex-wrap: wrap; }
  .title { font-size: 19px; }
  .cal-scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-left: -1rem; margin-right: -1rem; padding: 0 1rem; border-radius: 16px; position: relative; scrollbar-width: thin; }
  .cal-scroll-wrap::-webkit-scrollbar { height: 4px; }
  .cal-scroll-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .cal-wrap { width: 630px; min-width: 630px; }
  .day-headers { grid-template-columns: repeat(7, 90px); width: 630px; }
  .day-header { font-size: 12px; padding: 8px 0; }
  .days-grid { grid-template-columns: repeat(7, 90px); grid-auto-rows: 115px; }
  .day-cell { padding: 8px 6px; }
  .day-events { overflow: hidden; }
  .event-chip { font-size: 10px; padding: 2px 4px; margin-bottom: 2px; }
  .more-chip { font-size: 9px; }
}

/* ── MOBILE 가로 (≤900px landscape) ── */
@media (max-width: 900px) and (orientation: landscape) {
  .page { padding: 1rem 1.5rem 2rem; }
  .sticky-top { position: static; padding: 0; margin: 0; }
  .day-headers-sticky { display: none; }
  .day-headers { display: grid; }
  .cal-wrap { border-top: 1px solid var(--border); border-radius: 16px; }
  .day-headers { border-top: none; }
  .title { font-size: 18px; }
  .days-grid { grid-auto-rows: 80px; }
  .day-cell { padding: 8px 6px; }
  .day-events { overflow: hidden; }
  .event-chip { font-size: clamp(10px, 1.2vw, 13px); }
}
</style>

</head>
<body>
<div class="page">
  <div class="sticky-top">
    <div class="header">
      <div class="header-left">
        <div class="school-tag">KAIST College of Business</div>
        <div class="title">PMBA <span>14기</span> 캘린더</div>
      </div>
      <div class="header-right">
        <div class="last-updated" id="last-updated"></div>
      </div>
    </div>

    <div class="legend-wrap">
      <div class="legend legend-filters" id="legend-filters">
        <div class="legend-item" data-tag="[연합]"><div class="legend-dot" style="background:#7A3F9D"></div>연합모임</div>
        <div class="legend-item" data-tag="[기수]"><div class="legend-dot" style="background:#C0392B"></div>기수모임</div>
        <div class="legend-item" data-tag="[소모임]"><div class="legend-dot" style="background:#BA7517"></div>소모임</div>
        <div class="legend-item" data-tag="[세미나]"><div class="legend-dot" style="background:#2D6A2D"></div>세미나</div>
        <div class="legend-item" data-tag="[총학]"><div class="legend-dot" style="background:#4A4A4A"></div>총학생회</div>
        <div class="legend-item" data-tag="[학사]"><div class="legend-dot" style="background:#534AB7"></div>학사일정</div>
        <div class="legend-item" data-tag="[기타]"><div class="legend-dot" style="background:#5F5E5A"></div>기타</div>
      </div>
      <button class="filter-reset" id="filter-reset" onclick="resetFilter()">전체 보기</button>
      <button class="subscribe-btn" id="sub-btn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="11" rx="2" stroke="white" stroke-width="1.2"/><path d="M1 5h12" stroke="white" stroke-width="1.2"/><path d="M4 1v2M10 1v2" stroke="white" stroke-width="1.2" stroke-linecap="round"/></svg>
        내 캘린더에 구독
      </button>
    </div>

    <div class="cal-nav">
      <div style="display:flex;align-items:center;gap:6px;">
        <button class="nav-btn" id="prev-btn">&#8249;</button>
        <button class="nav-btn" id="today-btn" onclick="goToday()" style="font-size:12px;padding:5px 12px;">오늘</button>
      </div>
      <span class="month-label" id="month-label" onclick="openMonthPicker()" style="cursor:pointer;"></span>
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="display:flex;gap:4px;">
          <button class="view-btn active" id="btn-month" onclick="setView('month')">월</button>
          <button class="view-btn" id="btn-list" onclick="setView('list')">목록</button>
        </div>
        <button class="nav-btn" id="next-btn">&#8250;</button>
      </div>
    </div>
    <div id="month-picker-overlay" onclick="closeMonthPicker()"></div>
    <div id="month-picker" style="display:none; position: absolute; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-top: 4px;"></div>

    <div class="day-headers-sticky" id="day-headers-sticky"></div>
  </div>

  <div class="cal-scroll-outer" style="position: relative;">
    <div class="cal-scroll-wrap">
      <div class="cal-wrap" id="cal-wrap">
      <div class="state-msg">일정을 불러오는 중...</div>
      </div>
    </div>
    <div class="scroll-fade-right" id="scroll-fade"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <div class="detail-type" id="d-type"></div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-title" id="d-title"></div>
    <div class="detail-meta" id="d-meta"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const API_KEY = 'AIzaSyCllmHnJx8M-oaKjEzcxriUlNPlDGcQ-FI';
const CAL_ID = 'kaist.pmba.14@gmail.com';
const ICAL_URL = 'https://calendar.google.com/calendar/ical/kaist.pmba.14%40gmail.com/public/basic.ics';
const DOW = ['일','월','화','수','목','금','토'];
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

const TAG_MAP = [
  { tag: '[학사]',   color: '#534AB7', bg: '#EEEDFE', label: '학사일정',  priority: 0 },
  { tag: '[기수]',   color: '#C0392B', bg: '#FDECEA', label: '기수모임',  priority: 1 },
  { tag: '[연합]',   color: '#7A3F9D', bg: '#F3E8FB', label: '연합모임',  priority: 2 },
  { tag: '[세미나]', color: '#2D6A2D', bg: '#E6F4E6', label: '세미나',    priority: 3 },
  { tag: '[소모임]', color: '#BA7517', bg: '#FAEEDA', label: '소모임',    priority: 4 },
  { tag: '[총학]',   color: '#4A4A4A', bg: '#EFEFEF', label: '총학생회',  priority: 5 },
  { tag: '[기타]',   color: '#5F5E5A', bg: '#E8E7E3', label: '기타',      priority: 6 },
];
const DEFAULT_CI = { color: '#888', bg: '#F5F5F5', label: '일정' };

let currentDate = new Date();
let allEvents = [];
let focusedDate = null; // +N개 더 클릭 시 해당 날짜만 표시
let view = (() => { try { return localStorage.getItem('pmba14_view') || 'month'; } catch(e) { return 'month'; } })();

function getCI(ev) {
  const title = ev.summary || '';
  const match = TAG_MAP.find(t => title.startsWith(t.tag));
  return match || { ...DEFAULT_CI, priority: 99 };
}
function pad(n) { return String(n).padStart(2, '0'); }

function formatDateTime(ev) {
  if (ev.start.date) {
    const d = new Date(ev.start.date + 'T00:00:00');
    const DAYS2 = ['일','월','화','수','목','금','토'];
    return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS2[d.getDay()]}) · 종일`;
  }
  const s = new Date(ev.start.dateTime), e = new Date(ev.end.dateTime);
  const DAYS = ['일','월','화','수','목','금','토'];
  return `${s.getMonth()+1}월 ${s.getDate()}일 (${DAYS[s.getDay()]}) ${pad(s.getHours())}:${pad(s.getMinutes())} ~ ${pad(e.getHours())}:${pad(e.getMinutes())}`;
}

function showDetail(id) {
  const ev = allEvents.find(e => e.id === id);
  if (!ev) return;
  const ci = getCI(ev);
  document.getElementById('d-type').textContent = ci.label;
  document.getElementById('d-type').style.color = ci.color;
  document.getElementById('d-title').textContent = ev.summary || '(제목 없음)';
  let meta = formatDateTime(ev);
  if (ev.location) meta += '\n📍 ' + ev.location;
  if (ev.description) meta += '\n' + ev.description.replace(/<[^>]+>/g, '');
  document.getElementById('d-meta').textContent = meta;
  const panel = document.getElementById('detail-panel');
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeDetail() { document.getElementById('detail-panel').classList.remove('show'); }

function getEventsForDate(y, m, d) {
  const ds = `${y}-${pad(m+1)}-${pad(d)}`;
  return allEvents.filter(ev => {
    const start = (ev.start.date || ev.start.dateTime || '').slice(0,10);
    const endRaw = ev.end.date || ev.end.dateTime || '';
    const end = ev.end.date
      ? new Date(new Date(endRaw) - 86400000).toISOString().slice(0,10)
      : endRaw.slice(0,10);
    return start <= ds && ds <= end;
  });
}

function renderMonth() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  document.getElementById('month-label').textContent = `${y}년 ${MONTHS[m]}`;
  const firstDay = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m+1, 0).getDate();
  const prevLast = new Date(y, m, 0).getDate();
  const today = new Date();

  const stickyHeader = document.getElementById('day-headers-sticky');
  if (stickyHeader) {
    stickyHeader.innerHTML = DOW.map((d, i) => `<div class="day-header ${i === 0 ? 'sun' : i === 6 ? 'sat' : ''}">${d}</div>`).join('');
  }
  let html = '<div class="day-headers mobile-only">' + DOW.map((d, i) => `<div class="day-header ${i === 0 ? 'sun' : i === 6 ? 'sat' : ''}">${d}</div>`).join('') + '</div>';
  html += '<div class="days-grid">';

  let cells = [];
  for (let i = firstDay - 1; i >= 0; i--) cells.push({ d: prevLast - i, cur: false });
  for (let d = 1; d <= lastDate; d++) cells.push({ d, cur: true });
  while (cells.length % 7 !== 0) cells.push({ d: cells.length - firstDay - lastDate + 1, cur: false });

  cells.forEach(({ d, cur }, idx) => {
    const isToday = cur && d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
    const colDow = idx % 7;
    const dowCls = colDow === 0 ? ' sun' : colDow === 6 ? ' sat' : '';
    html += `<div class="day-cell${isToday ? ' today-cell' : ''}">`;
    if (cur) {
      const evs = getEventsForDate(y, m, d).filter(isVisible)
        .sort((a, b) => getCI(a).priority - getCI(b).priority);
      const isMobile = window.innerWidth <= 600;
      const limit = isMobile ? 3 : 4;
      const extra = evs.length - limit;
      html += '<div class="day-cell-header">';
      html += `<div class="day-num${isToday ? ' today' : ''}${dowCls}">${d}</div>`;
      if (extra > 0) html += `<div class="more-badge" onclick="focusDate('${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}')" style="cursor:pointer">+${extra}개 더</div>`;
      html += '</div>';
      html += '<div class="day-events">';
      evs.slice(0, limit).forEach(ev => {
        const ci = getCI(ev);
        const t = ev.summary || '일정';
        html += `<div class="event-chip" style="background:${ci.bg};color:${ci.color}" onclick="showDetail('${ev.id}')">${t}</div>`;
      });
      html += '</div>';
    } else {
      html += `<div class="day-cell-header"><div class="day-num other${dowCls}">${d}</div></div>`;
      html += '<div class="day-events"></div>';
    }
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('cal-wrap').innerHTML = html;
}

function renderList() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  document.getElementById('month-label').textContent = `${y}년 ${MONTHS[m]}`;
  const ms = `${y}-${pad(m+1)}-01`;
  const me = `${y}-${pad(m+1)}-${pad(new Date(y,m+1,0).getDate())}`;
  const evs = allEvents.filter(ev => {
    const s = (ev.start.date || ev.start.dateTime || '').slice(0,10);
    if (focusedDate) return s === focusedDate && isVisible(ev);
    return s >= ms && s <= me && isVisible(ev);
  }).sort((a, b) => {
    const dateA = (a.start.date || a.start.dateTime || '').slice(0,10);
    const dateB = (b.start.date || b.start.dateTime || '').slice(0,10);
    if (dateA !== dateB) return dateA < dateB ? -1 : 1;
    return getCI(a).priority - getCI(b).priority;
  });

  if (!evs.length) {
    document.getElementById('cal-wrap').innerHTML = '<div class="list-view"><div class="state-msg">이번 달 등록된 일정이 없습니다</div></div>';
    return;
  }

  let html = '<div class="list-view">';
  if (focusedDate) {
    const [fy, fm, fd] = focusedDate.split('-').map(Number);
    const fdate = new Date(fy, fm - 1, fd);
    const DAYS3 = ['일','월','화','수','목','금','토'];
    html += `<div class="focus-banner">${fm}월 ${fd}일 (${DAYS3[fdate.getDay()]}) 일정만 표시 중<button onclick="clearFocus()">전체 보기</button></div>`;
  }
  evs.forEach(ev => {
    const ci = getCI(ev);
    const startRaw = ev.start.date || ev.start.dateTime;
    const d = new Date(ev.start.date ? startRaw + 'T00:00:00' : startRaw);
    const LDAYS = ['일','월','화','수','목','금','토'];
    const timeStr = ev.start.date ? '종일' : `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    html += `<div class="list-item" onclick="showDetail('${ev.id}')">
      <div class="list-date"><div class="list-date-day">${d.getDate()}</div><div class="list-date-dow">${LDAYS[d.getDay()]}</div></div>
      <div class="list-dot" style="background:${ci.color}"></div>
      <div class="list-info">
        <div class="list-title">${ev.summary || '(제목 없음)'}</div>
        <div class="list-meta">${timeStr}${ev.location ? ' · ' + ev.location : ''}</div>
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('cal-wrap').innerHTML = html;
}

function focusDate(dateStr) {
  focusedDate = dateStr;
  const [y, m] = dateStr.split('-').map(Number);
  currentDate = new Date(y, m - 1, 1);
  setView('list');
}

function goToday() {
  currentDate = new Date();
  focusedDate = null;
  if (view === 'list') setView('month'); else render();
  // 렌더링 후 오늘 셀에 잠깐 하이라이트
  setTimeout(() => {
    const todayCell = document.querySelector('.day-cell.today-cell');
    if (todayCell) {
      todayCell.classList.add('today-pulse');
      setTimeout(() => todayCell.classList.remove('today-pulse'), 800);
    }
  }, 50);
}


function closeMonthPicker() {
  document.getElementById('month-picker').style.display = 'none';
  const overlay = document.getElementById('month-picker-overlay');
  if (overlay) overlay.classList.remove('show');
}

function openMonthPicker() {
  const picker = document.getElementById('month-picker');
  const overlay = document.getElementById('month-picker-overlay');
  if (picker.style.display === 'block') { closeMonthPicker(); return; }
  if (overlay) overlay.classList.add('show');
  const y = currentDate.getFullYear();
  const curM = currentDate.getMonth();
  let html = '<div style="font-size:12px;color:var(--muted);margin-bottom:8px;text-align:center;">';
  html += `<button onclick="changeYear(-1)" style="background:none;border:none;cursor:pointer;padding:0 8px;">‹</button>`;
  html += `<span style="font-weight:500;color:var(--text);">${y}년</span>`;
  html += `<button onclick="changeYear(1)" style="background:none;border:none;cursor:pointer;padding:0 8px;">›</button>`;
  html += '</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;">';
  for (let i = 0; i < 12; i++) {
    const active = i === curM;
    html += `<button onclick="pickMonth(${i})" style="font-size:12px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:${active?'var(--text)':'transparent'};color:${active?'#fff':'var(--text)'};cursor:pointer;font-family:'Noto Sans KR',sans-serif;">${i+1}월</button>`;
  }
  html += '</div>';
  picker.innerHTML = html;
  picker.style.display = 'block';
}

function changeYear(delta) {
  currentDate.setFullYear(currentDate.getFullYear() + delta);
  openMonthPicker();
  render();
}

function pickMonth(m) {
  currentDate.setMonth(m);
  closeMonthPicker();
  render();
}

// 월 선택기 바깥 클릭 시 닫기
document.addEventListener('click', (e) => {
  const picker = document.getElementById('month-picker');
  const label = document.getElementById('month-label');
  if (picker && picker.style.display === 'block' && !picker.contains(e.target) && e.target !== label) {
    closeMonthPicker();
  }
});

function render() {
  closeDetail();
  view === 'month' ? renderMonth() : renderList();
  // 렌더링 후 scroll fade 상태 갱신
  const fade = document.getElementById('scroll-fade');
  if (fade) {
    const scrollWrap = document.querySelector('.cal-scroll-wrap');
    if (scrollWrap) {
      setTimeout(() => scrollWrap.dispatchEvent(new Event('scroll')), 50);
    }
  }
}
function setView(v) {
  view = v;
  try { localStorage.setItem('pmba14_view', v); } catch(e) {}
  if (v === 'month') focusedDate = null;
  document.getElementById('btn-month').classList.toggle('active', v === 'month');
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  render();
}

document.getElementById('prev-btn').onclick = () => { currentDate.setMonth(currentDate.getMonth()-1); render(); };
document.getElementById('next-btn').onclick = () => { currentDate.setMonth(currentDate.getMonth()+1); render(); };

document.getElementById('sub-btn').onclick = () => {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(ICAL_URL).then(() => showToast('구독 링크가 복사되었습니다'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = ICAL_URL; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('구독 링크가 복사되었습니다');
  }
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

let activeTags = new Set();

function initScrollFade() {
  const scrollWrap = document.querySelector('.cal-scroll-wrap');
  const fade = document.getElementById('scroll-fade');
  if (!scrollWrap || !fade) return;
  
  const updateFade = () => {
    // PC에서는 fade 표시 자체를 CSS로 막고 있으니 JS에서도 체크
    const isMobilePortrait = window.matchMedia('(max-width: 600px) and (orientation: portrait)').matches;
    if (!isMobilePortrait) {
      fade.classList.add('hidden');
      return;
    }
    const maxScroll = scrollWrap.scrollWidth - scrollWrap.clientWidth;
    const atEnd = scrollWrap.scrollLeft >= maxScroll - 5;
    // 스크롤 영역 자체가 없거나 끝에 도달한 경우 숨김
    if (maxScroll <= 0 || atEnd) {
      fade.classList.add('hidden');
    } else {
      fade.classList.remove('hidden');
    }
  };
  
  // 스크롤/리사이즈 시 상태 갱신 (passive로 성능 최적화)
  scrollWrap.addEventListener('scroll', updateFade, { passive: true });
  window.addEventListener('resize', updateFade);
  // 최초 및 렌더링 후 상태 체크
  updateFade();
  // 렌더링 후 scrollWidth가 갱신되므로 약간의 딜레이 후 재체크
  setTimeout(updateFade, 100);
}

function initFilter() {
  document.querySelectorAll('#legend-filters .legend-item').forEach(el => {
    el.addEventListener('click', () => {
      const tag = el.dataset.tag;
      if (activeTags.has(tag)) {
        activeTags.delete(tag);
        el.classList.remove('inactive');
        if (activeTags.size === 0) {
          document.querySelectorAll('#legend-filters .legend-item').forEach(e => e.classList.remove('inactive'));
        }
      } else {
        activeTags.add(tag);
        document.querySelectorAll('#legend-filters .legend-item').forEach(e => {
          e.classList.toggle('inactive', !activeTags.has(e.dataset.tag));
        });
      }
      const resetBtn = document.getElementById('filter-reset');
      resetBtn.classList.toggle('show', activeTags.size > 0);
      render();
    });
  });
}

function resetFilter() {
  activeTags.clear();
  document.querySelectorAll('#legend-filters .legend-item').forEach(e => e.classList.remove('inactive'));
  document.getElementById('filter-reset').classList.remove('show');
  render();
}

function clearFocus() {
  focusedDate = null;
  render();
}

function isVisible(ev) {
  if (activeTags.size === 0) return true;
  const title = ev.summary || '';
  return Array.from(activeTags).some(tag => title.startsWith(tag));
}

function updateLastUpdated(calUpdated) {
  const el = document.getElementById('last-updated');
  if (!el) return;
  const d = calUpdated ? new Date(calUpdated) : new Date();
  const month = d.getMonth() + 1;
  const date = d.getDate();
  const h = pad(d.getHours()), m = pad(d.getMinutes());
  el.textContent = `마지막 업데이트 ${month}/${date} ${h}:${m}`;
}

async function fetchEvents() {
  const now = new Date();
  const tMin = new Date(now.getFullYear(), now.getMonth()-1, 1).toISOString();
  const tMax = new Date(now.getFullYear()+2, 11, 31).toISOString();
  const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY}&timeMin=${tMin}&timeMax=${tMax}&singleEvents=true&orderBy=startTime&maxResults=2500&_=${Date.now()}`;
  try {
    const res = await fetch(url, { cache: 'no-store' });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    allEvents = data.items || [];
    const calUpdated = data.updated || (allEvents.length
      ? allEvents.reduce((a, b) => (a.updated > b.updated ? a : b)).updated
      : null);
    updateLastUpdated(calUpdated);
    render();
  } catch(e) {
    document.getElementById('cal-wrap').innerHTML = `<div class="state-msg">일정을 불러올 수 없습니다<br><small>${e.message}</small></div>`;
  }
}

initFilter();
initScrollFade();
// 저장된 뷰 선호도에 따라 초기 active 상태 설정
document.getElementById('btn-month').classList.toggle('active', view === 'month');
document.getElementById('btn-list').classList.toggle('active', view === 'list');
fetchEvents();
</script>
